<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Billy's Global</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

<style>
body { font-family: Arial; background:#f5f5f5; }
.container { padding:20px; }
button { padding:10px; margin:5px; background:orange; border:none; color:white; }
.card { background:white; padding:10px; margin:10px; border-radius:10px; }
img { border-radius:10px; }
</style>
</head>

<body>

<div class="container">
<h1>BILLY'S GLOBAL</h1>

<button onclick="loadMarket('yiwu')">Yiwu</button>
<button onclick="loadMarket('shenzhen')">Shenzhen</button>
<button onclick="loadMarket('guangzhou')">Guangzhou</button>

<div id="products"></div>
</div>

<script>

// 🔥 CONFIG FIREBASE (REMPLACE)
const firebaseConfig = {
  apiKey: "TON_API_KEY",
  authDomain: "TON_PROJECT.firebaseapp.com",
  projectId: "TON_PROJECT"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 💰 CALCUL COMPLET
function calculPrix(p) {
  const douane = p.price * 0.15;
  const transport = p.transport;
  const marge = p.price * 0.25;

  return p.price + transport + douane + marge;
}

// 📦 CHARGER PRODUITS
function loadMarket(market) {
  const container = document.getElementById("products");
  container.innerHTML = "Chargement...";

  db.collection("products")
    .where("market", "==", market)
    .get()
    .then(snapshot => {
      container.innerHTML = "";

      snapshot.forEach(doc => {
        const p = doc.data();
        const prixFinal = calculPrix(p);

        const message = encodeURIComponent(
          `Bonjour, je veux commander : ${p.name} à ${prixFinal} GNF`
        );

        container.innerHTML += `
          <div class="card">
            <img src="${p.image}" width="100%">
            <h3>${p.name}</h3>
            <p>Prix final : ${prixFinal.toLocaleString()} GNF</p>
            <a href="https://wa.me/224XXXXXXXXX?text=${message}">
              <button>Commander sur WhatsApp</button>
            </a>
          </div>
        `;
      });
    });
}

</script>

</body>
</html>
