<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billy's Global | Import-Export Chine-Afrique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --dark-bg: #1a1a1a; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Roboto, sans-serif; }
        .hero-gradient { background: linear-gradient(135deg, #1a1a1a 0%, #333 100%); }
        .product-card { transition: all 0.3s ease; border: 1px solid #eee; }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .btn-tata { background-color: #25D366; color: white; }
    </style>
</head>
<body>

    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-black rounded-full flex items-center justify-center text-white font-bold">B</div>
                <span class="text-2xl font-bold text-gray-800">BILLY'S GLOBAL</span>
            </div>
            <div class="hidden md:flex space-x-8 font-medium text-gray-600">
                <a href="#" class="hover:text-orange-500">Marchés</a>
                <a href="#" class="hover:text-orange-500">Catégories</a>
                <a href="#" class="hover:text-orange-500">Suivi</a>
                <a href="#" class="hover:text-orange-500">Contact</a>
            </div>
            <div class="flex items-center gap-4">
                <i class="fa fa-search text-xl text-gray-500 cursor-pointer"></i>
                <i class="fa fa-shopping-cart text-xl text-gray-500 cursor-pointer"></i>
            </div>
        </div>
    </nav>

    <section class="hero-gradient text-white py-16 px-6 text-center">
        <h1 class="text-4xl md:text-5xl font-bold mb-4 uppercase tracking-wider">Votre Passerelle vers la Chine</h1>
        <p class="text-xl text-gray-300 mb-8">Nous importons, vous gagnez ! Qualité 1:1 certifiée Billy's Global.</p>
        <div class="flex justify-center gap-4">
            <div class="bg-white/10 p-4 rounded-lg backdrop-blur-sm">
                <p class="text-sm uppercase text-orange-400">Shenzhen</p>
                <p class="font-bold">Technologie</p>
            </div>
            <div class="bg-white/10 p-4 rounded-lg backdrop-blur-sm">
                <p class="text-sm uppercase text-orange-400">Guangzhou</p>
                <p class="font-bold">Commerce</p>
            </div>
            <div class="bg-white/10 p-4 rounded-lg backdrop-blur-sm">
                <p class="text-sm uppercase text-orange-400">Putian</p>
                <p class="font-bold">Sneakers</p>
            </div>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-4 py-12">
        <h2 class="text-2xl font-bold text-gray-800 mb-8 border-l-4 border-orange-500 pl-4 uppercase">Produits Populaires</h2>
        
        <div id="product-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <div class="fixed bottom-6 right-6 z-50">
        <a href="https://wa.me/224612073439" class="btn-tata p-4 rounded-full shadow-2xl flex items-center gap-3 hover:scale-110 transition-transform">
            <span class="font-bold">Besoin d'aide ? Tata est là</span>
            <i class="fab fa-whatsapp text-2xl"></i>
        </a>
    </div>

    <script>
        const config = {
            taux: 8600, // 1 USD = 8600 GNF
            marge: 1.23, // Vos 23% de profit
            fraisAir: 15, // 15$ par unité pour iPhone/Mèches
            fraisMer: 100000 // Forfait 100.000 GNF pour Jordan
        };

        const produits = [
            {
                nom: "iPhone 17 Pro Max (1 To)",
                usine: "Shenzhen Factory",
                prixUSD: 1600,
                type: "Air",
                image: "https://images.unsplash.com/photo-1633113088453-1217cec1b95a?q=80&w=300&h=300&fit=crop"
            },
            {
                nom: "Air Jordan 17 Retro Luxe",
                usine: "Putian LJR Batch",
                prixUSD: 85,
                type: "Mer",
                image: "https://images.unsplash.com/photo-1597040634101-2248545a602a?q=80&w=300&h=300&fit=crop"
            },
            {
                nom: "Kit Mèches Humaines Luxe",
                usine: "Yiwu Premium",
                prixUSD: 140,
                type: "Air",
                image: "https://images.unsplash.com/photo-1595475241949-0f02b2827304?q=80&w=300&h=300&fit=crop"
            }
        ];

        function formaterGNF(val) {
            return new Intl.NumberFormat('fr-FR').format(Math.ceil(val)) + " GNF";
        }

        function genererProduits() {
            const container = document.getElementById('product-container');
            
            produits.forEach(p => {
                let prixFinal = 0;
                if(p.type === "Air") {
                    prixFinal = (p.prixUSD * config.taux * config.marge) + (config.fraisAir * config.taux);
                } else {
                    prixFinal = (p.prixUSD * config.taux * config.marge) + config.fraisMer;
                }

                container.innerHTML += `
                    <div class="product-card bg-white rounded-xl overflow-hidden">
                        <img src="${p.image}" alt="${p.nom}" class="w-full h-64 object-cover">
                        <div class="p-6">
                            <p class="text-xs text-orange-500 font-bold uppercase mb-1">${p.usine}</p>
                            <h3 class="text-lg font-bold text-gray-800 mb-2">${p.nom}</h3>
                            <p class="text-2xl font-black text-gray-900 mb-4">${formaterGNF(prixFinal)}</p>
                            <p class="text-xs text-gray-400 mb-4 italic">Tout compris (Douane + Logistique + Taxe)</p>
                            <a href="https://wa.me/224612073439?text=Bonjour Tata, je veux commander le ${encodeURIComponent(p.nom)}" 
                               class="block text-center bg-gray-900 text-white py-3 rounded-lg font-bold hover:bg-black transition-colors">
                               COMMANDER
                            </a>
                        </div>
                    </div>
                `;
            });
        }

        genererProduits();
    </script>
</body>
</html>
