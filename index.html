<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BILLY’S GLOBAL</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: #0f172a;
      color: white;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<header class="bg-slate-900 shadow p-4 flex justify-between items-center">
  <h1 class="text-xl font-bold text-orange-500">BILLY’S GLOBAL</h1>

  <input id="search" type="text" placeholder="Rechercher un produit..."
    class="px-4 py-2 rounded-full text-black w-1/2">

  <div>
    🛒 <span id="cart-count">0</span>
  </div>
</header>

<!-- HERO -->
<section class="p-6">
  <img src="https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?w=1600"
       class="rounded-xl w-full h-60 object-cover">
</section>

<!-- MARCHÉS -->
<section class="p-6">
  <h2 class="text-xl mb-4">Les 3 grands marchés</h2>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

    <div class="bg-slate-800 p-4 rounded">
      <h3 class="text-lg font-bold">Yiwu</h3>
      <p>Marché de gros</p>
      <button onclick="filterMarket('yiwu')" class="bg-orange-500 w-full mt-2 py-2 rounded">Explorer</button>
    </div>

    <div class="bg-slate-800 p-4 rounded">
      <h3 class="text-lg font-bold">Shenzhen</h3>
      <p>Technologie</p>
      <button onclick="filterMarket('shenzhen')" class="bg-orange-500 w-full mt-2 py-2 rounded">Explorer</button>
    </div>

    <div class="bg-slate-800 p-4 rounded">
      <h3 class="text-lg font-bold">Guangzhou</h3>
      <p>Commerce</p>
      <button onclick="filterMarket('guangzhou')" class="bg-orange-500 w-full mt-2 py-2 rounded">Explorer</button>
    </div>

  </div>
</section>

<!-- PRODUITS -->
<section class="p-6">
  <h2 class="text-xl mb-4">Produits</h2>

  <div id="products" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
</section>

<script>

const products = [
  {name:"Chaussures Nike", price:120000, market:"guangzhou"},
  {name:"iPhone 13", price:5000000, market:"shenzhen"},
  {name:"Casque Bluetooth", price:150000, market:"shenzhen"},
  {name:"Sac Fashion", price:80000, market:"yiwu"},
  {name:"Montre Luxe", price:300000, market:"yiwu"},
];

let cart = 0;

function displayProducts(list) {
  const container = document.getElementById("products");
  container.innerHTML = "";

  list.forEach(p => {
    container.innerHTML += `
      <div class="bg-slate-800 p-3 rounded">
        <h3>${p.name}</h3>
        <p>${p.price.toLocaleString()} GNF</p>
        <button onclick="addToCart()" class="bg-green-500 w-full mt-2 py-1 rounded">Acheter</button>
      </div>
    `;
  });
}

function addToCart() {
  cart++;
  document.getElementById("cart-count").innerText = cart;
}

function filterMarket(market) {
  const filtered = products.filter(p => p.market === market);
  displayProducts(filtered);
}

document.getElementById("search").addEventListener("input", e => {
  const value = e.target.value.toLowerCase();
  const filtered = products.filter(p => p.name.toLowerCase().includes(value));
  displayProducts(filtered);
});

displayProducts(products);

</script>

</body>
</html>
